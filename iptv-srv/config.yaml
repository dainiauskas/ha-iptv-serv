name: "IPTV Server"
description: "Local IPTV proxy that validates streams and serves combined or per-playlist M3U"
version: "1.2.1"
slug: "iptv_srv"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: "services"
boot: "auto"
ports:
  8080/tcp: 8080
map:
  - config:rw
options:
  playlists:
    - name: "lit"
      url: "https://iptv-org.github.io/iptv/languages/lit.m3u"
    - name: "rus"
      url: "https://iptv-org.github.io/iptv/languages/rus.m3u"
schema:
  playlists:
    - name: str
      url: str
